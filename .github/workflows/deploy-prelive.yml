name: Deploy to Prelive

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prelive

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore FTP delta state
        uses: actions/cache@v4
        with:
          path: .ftp-deploy-sync-state-prelive.json
          key: ftp-state-prelive-${{ github.sha }}
          restore-keys: |
            ftp-state-prelive-

      - name: Build frontend assets
        run: |
          npm install
          npm run build

      - name: Deploy via FTP (attempt 1)
        id: ftp_deploy_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 300000
          local-dir: ./
          server-dir: ${{ vars.DEPLOY_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-prelive.json
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.claude/**
            .env
            public/storage
            public/media/**
            storage/app/public/**
            storage/logs/**
            storage/framework/cache/**
            storage/framework/views/**

      - name: Deploy via FTP (attempt 2)
        if: steps.ftp_deploy_1.outcome == 'failure'
        id: ftp_deploy_2
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 300000
          local-dir: ./
          server-dir: ${{ vars.DEPLOY_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-prelive.json
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.claude/**
            .env
            public/storage
            public/media/**
            storage/app/public/**
            storage/logs/**
            storage/framework/cache/**
            storage/framework/views/**

      - name: Run post-deploy commands
        run: |
          sleep 10
          URL="${{ vars.DEPLOY_POST_URL }}"
          if [[ "$URL" == *\?* ]]; then
            URL="${URL}&composer=1"
          else
            URL="${URL}?composer=1"
          fi
          curl -fsSL "$URL"
