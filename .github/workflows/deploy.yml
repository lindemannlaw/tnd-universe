name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore FTP delta state
        uses: actions/cache@v4
        with:
          path: .ftp-deploy-sync-state.json
          key: ftp-state-prod-${{ github.sha }}
          restore-keys: |
            ftp-state-prod-

      - name: Build frontend assets
        run: |
          npm ci
          npm run build

      # Assets first: upload public/build/ additively (no delete) so the new
      # hashed CSS/JS files exist on the server BEFORE the Blade templates
      # that reference them go live. Old hashed files coexist for the brief
      # transition window — Vite's content-hashed filenames make this race-free.
      # Old orphaned assets accumulate but are tiny (~200 KB per deploy) and
      # can be reclaimed by a periodic manual cleanup if ever needed.
      - name: Install lftp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Deploy public/build (additive, race-free)
        timeout-minutes: 5
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_BUILD_DIR: ${{ vars.DEPLOY_SERVER_DIR }}public/build/
        run: |
          # mirror -R = reverse (local -> remote). NO --delete flag means
          # files only present remotely stay there — exactly what we want
          # so in-flight requests referencing old hashes don't 404.
          #
          # Explicit FTPS (AUTH TLS on port 21) — matches the SamKirkland action's
          # `protocol: ftps; port: 21` setting. Use ftp:// scheme + ssl-force,
          # NOT ftps:// (which would default to implicit FTPS on port 990).
          #
          # IMPORTANT: SSL settings must be applied BEFORE `open`. With -e the
          # script runs AFTER connecting, so SSL never takes effect and the
          # connection fails ("mirror: Not connected"). Use -c with an explicit
          # `open` so settings precede the connect handshake.
          #
          # cmd:fail-exit makes lftp return non-zero on any script error so a
          # silent FTP failure doesn't masquerade as a successful deploy.
          # Sequential transfers (no --parallel): Plesk FTP typically allows
          # only one concurrent session per user. Parallel sessions hang
          # waiting for a free slot. The build dir is small (~4 MB), so
          # sequential is fast enough and dramatically more reliable.
          #
          # Strict timeouts so a stuck transfer fails fast instead of
          # hanging until the job timeout (we saw a 14-minute hang).
          # net:idle = close idle connections after 30s
          # net:timeout = abort a single op if no progress for 60s
          # net:max-retries = retry transient failures up to 3 times
          #
          # Drop --verbose: lftp's verbose mode floods stderr with per-byte
          # progress that slows the runner.
          lftp -c "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ftp:ssl-protect-list true;
            set ftp:ssl-auth TLS;
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            set ftp:use-mlsd no;
            set net:idle 30;
            set net:timeout 60;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set net:reconnect-interval-multiplier 1;
            set cmd:fail-exit true;
            open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"ftp://$FTP_SERVER:21\";
            mirror -R --no-perms ./public/build/ \"$REMOTE_BUILD_DIR\";
            bye
          "

      - name: Deploy via FTP (attempt 1)
        id: ftp_deploy_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 300000
          local-dir: ./
          server-dir: ${{ vars.DEPLOY_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state.json
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.claude/**
            .env
            public/build/**
            public/storage
            public/media/**
            storage/app/public/**
            storage/logs/**
            storage/framework/cache/**
            storage/framework/views/**

      - name: Deploy via FTP (attempt 2)
        if: steps.ftp_deploy_1.outcome == 'failure'
        id: ftp_deploy_2
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          timeout: 300000
          local-dir: ./
          server-dir: ${{ vars.DEPLOY_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state.json
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/vendor/**
            **/tests/**
            **/.claude/**
            .env
            public/build/**
            public/storage
            public/media/**
            storage/app/public/**
            storage/logs/**
            storage/framework/cache/**
            storage/framework/views/**

      - name: Run post-deploy commands
        run: |
          sleep 10
          URL="${{ vars.DEPLOY_POST_URL }}"
          if [[ "$URL" == *\?* ]]; then
            URL="${URL}&composer=1"
          else
            URL="${URL}?composer=1"
          fi
          curl -fsSL "$URL"
